name: Auto Release on PR Merge

on:
  push:
    branches: [main]

jobs:
  check-conditions:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      release_notes: ${{ steps.check.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release conditions
        id: check
        run: |
          VERSION=$(node -e "console.log(require('./desktop/package-lock.json').version)")
          echo "Detected version: $VERSION"

          SHOULD_RELEASE=true

          # Guard 1: tag must not exist yet
          if [ -n "$(git tag --list "v$VERSION")" ]; then
            echo "Tag v$VERSION already exists — skipping release"
            SHOULD_RELEASE=false
          fi

          # Guard 2: CHANGELOG must contain an entry for this version
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "No CHANGELOG entry for $VERSION — skipping release"
            SHOULD_RELEASE=false
          fi

          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Extract release notes block (from ## [VERSION] to the next ## [ line, exclusive)
          if [ "$SHOULD_RELEASE" = "true" ]; then
            NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
            echo "release_notes<<EOF" >> "$GITHUB_OUTPUT"
            echo "$NOTES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

  update-readme:
    runs-on: ubuntu-latest
    needs: check-conditions
    if: needs.check-conditions.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update README version references
        run: |
          VERSION="${{ needs.check-conditions.outputs.version }}"
          OLD_VERSION=$(grep -oP 'v\d+\.\d+\.\d+' README.md | sort -V | tail -1 | sed 's/v//')

          if [ "$OLD_VERSION" != "$VERSION" ]; then
            echo "Updating README from v$OLD_VERSION to v$VERSION"
            sed -i "s/v$OLD_VERSION/v$VERSION/g" README.md
          else
            echo "README already references v$VERSION — no update needed"
          fi

      - name: Commit and push README update
        run: |
          VERSION="${{ needs.check-conditions.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update README to v$VERSION [skip ci]" || echo "No changes to commit"
          git push

  build-macos:
    runs-on: macos-latest
    needs: [check-conditions, update-readme]
    if: needs.check-conditions.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Python venv
        run: |
          cd server
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Build desktop app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: bash build-desktop.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: dist-desktop/

  build-windows:
    runs-on: windows-latest
    needs: [check-conditions, update-readme]
    if: needs.check-conditions.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Python venv
        shell: bash
        run: |
          cd server
          python -m venv .venv
          source .venv/Scripts/activate
          pip install -r requirements.txt

      - name: Build desktop app
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: bash build-desktop.sh

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dist-desktop/

  create-release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: release-artifacts/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: release-artifacts/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-conditions.outputs.version }}"
          gh release create "v$VERSION" release-artifacts/**/*.dmg release-artifacts/**/*.exe \
            --title "v$VERSION" \
            --notes "${{ needs.check-conditions.outputs.release_notes }}"
