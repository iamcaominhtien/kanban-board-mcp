name: Build and Release

on:
  push:
    branches:
      - main
      - vk/cicd-pipeline
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            ui/package-lock.json
            desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-path: "server/uv.lock"

      - name: Install UI dependencies
        working-directory: ui
        run: npm install

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Install Python dependencies
        working-directory: server
        run: |
          uv sync --group dev
          uv pip install pyinstaller

      - name: Build Python binaries (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: server
        run: |
          mkdir -p ../dist-python
          uv run python -m PyInstaller --distpath ../dist-python --workpath ../desktop/build/pyinstaller-work --noconfirm ../desktop/kanban-server.spec
          uv run python -m PyInstaller --distpath ../dist-python --workpath ../desktop/build/pyinstaller-work --noconfirm ../desktop/kanban-mcp-stdio.spec

      - name: Build Python binaries (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: server
        run: |
          mkdir -p ../dist-python
          uv run python -m PyInstaller --distpath ../dist-python --workpath ../desktop/build/pyinstaller-work --noconfirm ../desktop/kanban-server.spec
          uv run python -m PyInstaller --distpath ../dist-python --workpath ../desktop/build/pyinstaller-work --noconfirm ../desktop/kanban-mcp-stdio.spec

      - name: Install Desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Debug - List Files
        run: |
          ls -R dist-python || true
          ls -R ui/dist || true

      - name: Package Desktop App
        working-directory: desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""
          CSC_IDENTITY_AUTODISCOVERY: false
          DEBUG: electron-builder
        run: |
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            npm run dist:mac
          else
            npm run dist:win
          fi
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-artifacts-${{ matrix.os }}
          path: |
            dist-desktop/*.dmg
            dist-desktop/*.exe
            dist-desktop/*.zip

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/app-artifacts-macos-latest/*.dmg
            artifacts/app-artifacts-windows-latest/*.exe
          generate_release_notes: true
