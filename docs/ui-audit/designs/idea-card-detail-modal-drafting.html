<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Idea Detail Modal - Drafting</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { display: ['"Fredoka"', 'sans-serif'], body: ['"Nunito"', 'sans-serif'], },
        borderWidth: { '3': '3px' },
        colors: { bg: '#E2F1FF', card1: '#FFD6E8', card2: '#FEF0B5', card3: '#D0F4DE', card4: '#EAD6FF', outline: '#2B2B2B', btn: '#FF94B8' }
      }
    }
  }
</script>
<style>
  body { background-color: theme('colors.bg'); color: theme('colors.outline'); font-family: theme('fontFamily.body'); }
  .neo-brutal { border: 3px solid theme('colors.outline'); box-shadow: 4px 4px 0px theme('colors.outline'); }
  .neo-panel { border: 3px solid theme('colors.outline'); box-shadow: 8px 8px 0px rgba(43,43,43,0.4); border-radius: 1.5rem; }
  .neo-btn { border: 3px solid theme('colors.outline'); box-shadow: 3px 3px 0px theme('colors.outline'); border-radius: 99px; transition: transform 0.1s, box-shadow 0.1s; }
  .neo-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px theme('colors.outline'); }
  .notebook-bg {
    background-color: #FEF9E7;
    background-image: repeating-linear-gradient(transparent, transparent 27px, #D1D5DB 27px, #D1D5DB 29px);
    line-height: 29px;
  }
</style>
</head>
<body class="h-screen w-screen overflow-hidden bg-bg relative flex flex-col p-6">
  
  <!-- Backdrop Board (simplified) -->
  <header class="flex justify-between items-center mb-8 bg-white neo-brutal rounded-3xl p-4 opacity-50 blur-[2px]">
    <h1 class="font-display font-bold text-3xl flex items-center gap-3"><span class="w-10 h-10 bg-btn border-3 border-outline rounded-xl flex items-center justify-center shadow-[2px_2px_0px_#2B2B2B] text-xl">✨</span> Idea Space</h1>
  </header>
  <div class="flex-1 flex gap-6 overflow-hidden opacity-50 blur-[2px]">
    <div class="w-80 bg-card4 neo-brutal rounded-3xl p-4"></div>
  </div>

  <!-- MODAL OVERLAY -->
  <div class="absolute inset-0 bg-black/10 backdrop-blur-[4px] z-50 flex items-center justify-center p-4">
    <!-- Modal Container -->
    <div class="bg-white neo-panel w-full max-w-3xl max-h-[95vh] flex flex-col overflow-hidden relative">
      
      <!-- Close -->
      <button class="absolute top-4 right-4 w-10 h-10 bg-white neo-btn flex items-center justify-center font-bold text-xl z-10 hover:bg-gray-100">✕</button>

      <!-- Content Scrollable Area -->
      <div class="overflow-y-auto flex-1 flex flex-col">
        <!-- Header / Cover -->
        <div class="h-28 bg-card4 border-b-3 border-outline relative shrink-0">
          <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#2B2B2B 1px, transparent 1px); background-size: 16px 16px;"></div>
          <!-- Icon Picker -->
          <div class="absolute -bottom-8 left-8 w-16 h-16 bg-white neo-brutal rounded-full flex items-center justify-center text-4xl shadow-[2px_2px_0_0_#2B2B2B] cursor-pointer hover:scale-105 active:scale-95 transition-transform z-10">
            🌱
          </div>
        </div>

        <div class="px-8 pb-8 pt-12 flex flex-col gap-8 flex-1">
          <!-- Title & Column Status -->
          <div class="flex flex-col gap-2">
            <div class="flex items-center gap-2 mb-1">
              <span class="bg-card4 border-3 border-outline font-bold text-sm px-3 py-1 rounded-full shadow-[2px_2px_0px_#2B2B2B] flex items-center gap-1">
                <span>💭</span> Drafting
              </span>
            </div>
            <input type="text" class="font-display font-bold text-5xl w-full outline-none text-outline placeholder:text-gray-300" value="Gamified Onboarding" placeholder="Give your idea a title..." />
          </div>

          <!-- Energy Tags Picker -->
          <div class="flex flex-col gap-3">
            <label class="font-bold text-sm text-gray-500 uppercase tracking-widest">Energy Level</label>
            <div class="flex flex-wrap gap-4">
              <!-- Active variant -->
              <button class="neo-btn bg-white px-5 py-2 font-bold text-base shadow-[4px_4px_0_0_#2B2B2B] ring-2 ring-outline ring-offset-2 -rotate-2">🌱 Seed</button>
              
              <!-- Inactive variants -->
              <button class="neo-btn bg-card2 px-5 py-2 font-bold text-sm opacity-50 hover:opacity-100">💡 Concept</button>
              <button class="neo-btn bg-btn text-white px-5 py-2 font-bold text-sm opacity-50 hover:opacity-100">🔥 Hot</button>
              <button class="neo-btn bg-white px-5 py-2 font-bold text-sm opacity-50 hover:opacity-100">🚀 Big Bet</button>
            </div>
          </div>

          <!-- Description Notebook -->
          <div class="flex flex-col gap-3 flex-1">
            <label class="font-bold text-sm text-gray-500 uppercase tracking-widest">Description</label>
            <div class="neo-brutal notebook-bg rounded-2xl min-h-[220px] p-6 relative flex-1">
              <div class="absolute left-8 top-0 bottom-0 w-[2px] bg-red-300 opacity-50"></div>
              <textarea class="w-full h-full bg-transparent outline-none resize-none font-body font-semibold text-xl text-outline pl-8 pt-1" placeholder="Scribble your rough thoughts here...">Add a progress bar and confetti when users create their first 3 tasks.</textarea>
            </div>
          </div>

          <!-- Tags -->
          <div class="flex flex-col gap-3">
            <label class="font-bold text-sm text-gray-500 uppercase tracking-widest">Tags</label>
            <div class="flex flex-wrap gap-2 items-center">
              <button class="w-32 h-8 rounded-full border-2 border-dashed border-gray-400 text-gray-500 flex items-center justify-center hover:bg-gray-100 font-bold text-sm opacity-70 hover:opacity-100 transition-opacity">
                + Add Tag
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Action Footer (No Promote button for drafting) -->
      <div class="bg-gray-50 border-t-3 border-outline p-6 flex items-center justify-between shrink-0">
        <div class="text-xs font-bold text-gray-400">
          Created: just now &bull; Unsaved changes
        </div>
        <div class="flex items-center gap-4">
          <button class="text-gray-500 hover:text-red-500 font-bold px-3 py-2 mr-2 underline decoration-2 underline-offset-4">Discard Idea</button>
          <button class="neo-btn bg-bg px-10 py-3 font-display text-xl font-bold hover:bg-blue-100 shadow-[4px_4px_0_0_#2B2B2B]">Save Idea</button>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
